<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | All Star Sprinkler Systems, Inc.</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--blue:#0366fe;--green:#5eb23e;--green-dark:#4c9531}
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Montserrat',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px 22px;gap:22px;
    background:
      radial-gradient(1100px 520px at 82% -12%, rgba(3,102,254,.30), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(94,178,62,.12), transparent 55%),
      linear-gradient(160deg,#070a11 0%,#0a1832 52%,#0c2a72 100%);
  }
  img{display:block}
  .logo{width:min(64vw,300px);height:auto;margin-bottom:6px}
  .code{font-family:'Bowlby One',sans-serif;font-size:clamp(3.4rem,14vw,6.5rem);line-height:.9;color:var(--green);letter-spacing:.01em}
  h1{font-family:'Bowlby One',sans-serif;font-size:clamp(1.5rem,5vw,2.4rem);letter-spacing:.01em}
  p{color:rgba(255,255,255,.72);font-size:1.02rem;max-width:460px;font-weight:500}
  .actions{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:8px}
  .btn{
    display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:.98rem;text-decoration:none;
    border-radius:999px;padding:14px 30px;border:2px solid transparent;transition:transform .25s,background .25s,color .25s,border-color .25s;
  }
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-green:hover{background:transparent;color:var(--green);transform:translateY(-3px)}
  .btn-ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.6)}
  .btn-ghost:hover{background:#fff;color:#0a1832;transform:translateY(-3px)}
</style>
</head>
<body>
  <a href="/"><img class="logo" src="/images/logo.png" alt="All Star Sprinkler Systems, Inc."></a>
  <div class="code">404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>Sorry, we couldn't find that page. It may have moved or no longer exists — let's get you back on track.</p>
  <div class="actions">
    <a class="btn btn-green" href="/">Back to Home →</a>
    <a class="btn btn-ghost" href="/contact.html">Contact Us</a>
  </div>
</body>
</html>
